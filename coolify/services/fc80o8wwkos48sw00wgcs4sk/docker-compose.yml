      - 'traefik.http.routers.https-0-fc80o8wwkos48sw00wgcs4sk-ghost.middlewares=gzip,redir-ghost-fc80o8wwkos48sw00wgcs4sk'
      - 'traefik.http.routers.https-0-fc80o8wwkos48sw00wgcs4sk-ghost.rule=Host(`ghost.appexx.me`) && PathPrefix(`/`)'
